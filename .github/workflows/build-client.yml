name: Client客户端插件编译
on:
  workflow_dispatch:

jobs:
  build-client:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Clone Client仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GBK → UTF-8 编码转换（保留所有中文函数名）
        run: |
          $files = Get-ChildItem -Path "Fd\" -Include *.cpp,*.h,*.c -Recurse
          foreach ($file in $files) {
            # 以 GBK 正确读取中文代码（函数名/变量名完全保留）
            $content = Get-Content -Path $file.FullName -Encoding OEM -Raw
            
            # 仅修复换行符，不修改任何代码内容
            $content = $content -replace "`r`n", "`n" -replace "`n", "`r`n"
            
            # 强制保存为 无BOM UTF-8（VS2022 完美支持中文函数名）
            $utf8NoBom = New-Object System.Text.UTF8Encoding $false
            $bytes = $utf8NoBom.GetBytes($content)
            [System.IO.File]::WriteAllBytes($file.FullName, $bytes)
          }
          echo "编码转换完成"

      - name: 生成Client发布版本号
        id: version
        shell: bash
        run: |
          new_tag="client-v1.0.0"
          latest=$(gh release list --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -n "$latest" ] && [[ $latest =~ client-v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            new_patch=$((patch + 1))
            new_tag="client-v$major.$minor.$new_patch"
          fi
          echo "tag=$new_tag" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置VS环境
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
          vsversion: 2022

      - name: 编译 Fd/Fd.sln
        run: |
          msbuild "Fd/Fd.sln" `
            /p:Configuration=Home `
            /p:Platform=x86 `
            /p:LanguageStandard=stdcpp17 `
            /p:Charset=Unicode `
            /p:CharacterSet=Unicode `
            /p:AdditionalOptions="/utf-8 /source-charset:utf-8 /execution-charset:utf-8 /Zc:char8_t-"
        shell: pwsh

      - name: 整理编译插件
        run: |
          mkdir output
          if (Test-Path Fd\x86\Home\Fd.dll") {
            xcopy "Fd\x86\Home\Fd.dll" "output\" /y /s /q
          }
          if (Test-Path "Fd\Fd.dll") {
            xcopy "Fd\Fd.dll" "output\" /y /s /q
          }

      - name: 上传到GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }}"
          body: "客户端插件\n Fd.dll"
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}